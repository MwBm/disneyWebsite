name: Collect Wait Times

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger data collection
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/collect" \
            -H "Authorization: Bearer ${{ secrets.COLLECT_SECRET }}" \
            | grep -q "^2" || exit 1
