name: Sync Date Context

on:
  schedule:
    # 1st of each month at 10:00 UTC
    - cron: "0 10 1 * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call sync-date-context endpoint
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-date-context"
